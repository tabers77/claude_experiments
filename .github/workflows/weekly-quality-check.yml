name: Weekly Quality Check

# Simplified: 1 job, creates/updates a GitHub issue with findings.
# No PRs, no auto-merge, no JSON parsing.

on:
  workflow_call:
    inputs:
      analysis_mode:
        description: "upgrade, strategic, or both"
        type: string
        default: "both"
      model:
        description: "Azure OpenAI model"
        type: string
        default: "gpt-5.2"
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_CLIENT_SECRET:
        required: true
      KEY_VAULT_ENDPOINT:
        required: true

  schedule:
    - cron: "0 9 * * 1"

  workflow_dispatch:
    inputs:
      analysis_mode:
        description: "Analysis mode"
        type: choice
        options: ["upgrade", "strategic", "both"]
        default: "both"

permissions:
  contents: read
  issues: write

jobs:
  analyze-and-report:
    name: Analyze & Create Issue
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4

      - name: Checkout quality-action scripts
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/claude_experiments
          path: _quality-action
          sparse-checkout: scripts/quality-action

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r _quality-action/scripts/quality-action/requirements.txt

      - name: Run analysis
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
          KEY_VAULT_ENDPOINT: ${{ secrets.KEY_VAULT_ENDPOINT }}
        run: |
          python _quality-action/scripts/quality-action/run_analysis.py \
            --repo-path "${{ github.workspace }}" \
            --mode "${{ inputs.analysis_mode || 'both' }}" \
            --model "${{ inputs.model || 'gpt-5.2' }}" \
            --output "${{ github.workspace }}/.quality-report.md"

      - name: Create or update issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LABEL="quality-check"
          DATE=$(date +%Y-%m-%d)
          TITLE="Weekly Quality Report - $DATE"

          # Append footer
          echo "" >> .quality-report.md
          echo "---" >> .quality-report.md
          echo "*Generated by [Weekly Quality Check](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})*" >> .quality-report.md

          # Ensure label exists
          gh label create "$LABEL" --color "0e8a16" --description "Automated weekly quality check" 2>/dev/null || true

          # Find existing open issue
          EXISTING=$(gh issue list --label "$LABEL" --state open --limit 1 --json number --jq '.[0].number // empty')

          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --title "$TITLE" --body-file .quality-report.md
            echo "Updated issue #$EXISTING"
          else
            gh issue create --title "$TITLE" --label "$LABEL" --body-file .quality-report.md
            echo "Created new issue"
          fi
